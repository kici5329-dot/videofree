<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>VideoFree</title>
    <link rel="manifest" href="/videofree/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/videofree/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/videofree/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/videofree/icons/icon-192.png">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100dvh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        .header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;flex-shrink:0}
        .logo{font-size:20px;font-weight:700;color:#ff4757}
        .spacer{flex:1}
        .install-btn{display:none;padding:8px 16px;border:none;border-radius:20px;background:#ff4757;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
        .install-btn.show{display:block}

        .main{padding:0 16px;display:flex;flex-direction:column;gap:10px;flex:1}
        
        .input-row{display:flex;gap:8px}
        .input-row input{flex:1;padding:13px 16px;border:1.5px solid #333;border-radius:14px;background:#1c1c1c;color:#fff;font-size:15px;outline:none;transition:border 0.2s}
        .input-row input:focus{border-color:#ff4757}
        .input-row input::placeholder{color:#555}
        .input-row button{padding:13px 20px;border:none;border-radius:14px;background:#ff4757;color:#fff;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}

        .tags{display:flex;gap:6px;flex-wrap:wrap}
        .tags button{padding:7px 14px;border:1px solid #333;border-radius:20px;background:#1c1c1c;color:#bbb;font-size:12px;cursor:pointer}
        .tags button:active{background:#ff4757;border-color:#ff4757;color:#fff}

        .player-area{background:#000;border-radius:8px;overflow:hidden;position:relative;min-height:200px;display:flex;align-items:center;justify-content:center}
        .player-area video{width:100%;max-height:55vh;background:#000;display:none}
        .player-area video.show{display:block}
        .empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;color:#555;padding:40px 20px;text-align:center}
        .empty-state.hide{display:none}
        .empty-state svg{opacity:0.3}

        .err-msg{color:#ff6b6b;font-size:13px;padding:4px 0;display:none;line-height:1.5}
        .err-msg.show{display:block}

        .meta{font-size:12px;color:#777;padding:4px 0;display:none;line-height:1.5}
        .meta.show{display:block}
        .meta b{color:#ccc}

        .controls{display:flex;gap:6px;flex-wrap:wrap}
        .controls button{padding:9px 14px;border:1px solid #333;border-radius:10px;background:#1c1c1c;color:#ccc;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px}
        .controls button:active{background:#333}
        .controls button.on{background:#ff4757;border-color:#ff4757;color:#fff}

        .guide{margin-top:8px;padding:12px;background:#1a1a1a;border-radius:10px;font-size:12px;color:#888;line-height:1.8}
        .guide summary{color:#ccc;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:4px}
        .guide summary::marker{color:#ff4757}
        .guide code{background:#2a2a2a;padding:1px 6px;border-radius:4px;font-size:11px;color:#ff6b81}

        .history{flex:1;overflow-y:auto;margin-top:4px}
        .history h3{font-size:12px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
        .hitem{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;margin-bottom:3px;cursor:pointer;font-size:13px;color:#bbb}
        .hitem:active{background:#1a1a1a}
        .hitem span:nth-child(2){flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .hitem .del{color:#666;font-size:16px;flex-shrink:0;padding:2px 6px}
        .empty{color:#444;font-size:13px;text-align:center;padding:20px}

        .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
        .toast.show{opacity:1}
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">▶ VideoFree</span>
        <span class="spacer"></span>
        <button class="install-btn" id="installBtn">📲 安装应用</button>
    </div>

    <div class="main">
        <div class="input-row">
            <input type="url" id="urlInput" placeholder="粘贴视频直链 (mp4 / m3u8 / webm)…" autocomplete="off">
            <button id="playBtn">▶ 播放</button>
        </div>

        <div class="tags">
            <button data-url="https://www.w3schools.com/html/mov_bbb.mp4">🐰 Big Buck Bunny</button>
            <button data-url="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4">🐰 Bunny 720p</button>
            <button data-url="https://raw.githubusercontent.com/mediaelement/mediaelement-files/master/big_buck_bunny.mp4">🐰 Bunny GitHub</button>
        </div>

        <div class="player-area" id="playerArea">
            <div class="empty-state" id="emptyState">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <span>输入视频地址开始播放</span>
            </div>
            <video id="videoPlayer" controls playsinline></video>
        </div>

        <div class="err-msg" id="errMsg"></div>
        <div class="meta" id="metaInfo"></div>

        <div class="controls">
            <button id="pipBtn">🖼 画中画</button>
            <button id="fsBtn">⛶ 全屏</button>
            <button id="loopBtn">🔁 循环</button>
            <button id="spBtn">⚡ 1.0x</button>
        </div>

        <details class="guide">
            <summary>💡 如何获取视频直链？</summary>
            <p>1. 在浏览器打开目标网页，长按视频 → <b>复制视频地址</b><br>
               2. 或在网页空白处 → <b>查看页面源代码</b> → 搜索 <code>.mp4</code> <code>.m3u8</code> <code>.ts</code><br>
               3. 部分网站按 F12 → Network 标签 → 刷新页面 → 筛选 <code>m3u8</code> 或 <code>mp4</code><br>
               4. 把找到的视频直链粘贴到上方输入框播放<br><br>
               ⚠️ 粘贴网页地址（如 missav.ws/xxx）无法播放——需提取其中的视频直链。</p>
        </details>

        <div class="history">
            <h3>📋 播放历史</h3>
            <div id="histList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const video = document.getElementById("videoPlayer");
        const urlInput = document.getElementById("urlInput");
        const emptyState = document.getElementById("emptyState");
        const errMsg = document.getElementById("errMsg");
        const metaInfo = document.getElementById("metaInfo");
        const histList = document.getElementById("histList");
        const toastEl = document.getElementById("toast");
        const installBtn = document.getElementById("installBtn");
        let currentUrl = "";
        let hlsInstance = null;

        // ====== Install ======
        let deferredPrompt = null;
        window.addEventListener("beforeinstallprompt", function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add("show");
        });
        window.addEventListener("appinstalled", function() {
            installBtn.classList.remove("show");
            deferredPrompt = null;
            toast("安装成功！");
        });
        installBtn.addEventListener("click", function() {
            if (!deferredPrompt) { toast("用 Chrome 菜单 → 添加到主屏幕"); return; }
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(result) {
                installBtn.classList.remove("show");
                deferredPrompt = null;
                toast(result.outcome === "accepted" ? "正在安装…" : "已取消");
            }).catch(function() {
                toast("安装失败，请用 Chrome 菜单手动安装");
            });
        });

        // ====== Toast ======
        function toast(msg) { toastEl.textContent = msg; toastEl.classList.add("show"); setTimeout(function(){ toastEl.classList.remove("show"); }, 2000); }

        // ====== History ======
        var playbackHistory = JSON.parse(localStorage.getItem("vf_hist4") || "[]");
        function saveHist(url, title) {
            playbackHistory = playbackHistory.filter(function(h){ return h.url !== url; });
            playbackHistory.unshift({url:url, title:title||url, time:Date.now()});
            if (playbackHistory.length > 30) playbackHistory.pop();
            localStorage.setItem("vf_hist4", JSON.stringify(playbackHistory));
            renderHist();
        }
        function renderHist() {
            if (!playbackHistory.length) { histList.innerHTML = '<div class="empty">暂无播放记录</div>'; return; }
            histList.innerHTML = playbackHistory.map(function(h,i){
                return '<div class="hitem" data-url="'+esc(h.url)+'"><span>▶</span><span>'+esc(h.title)+'</span><span class="del" data-idx="'+i+'">✕</span></div>';
            }).join("");
            histList.querySelectorAll(".hitem").forEach(function(item){
                item.addEventListener("click", function(e){
                    if (e.target.classList.contains("del")) return;
                    urlInput.value = item.dataset.url; play(item.dataset.url);
                });
            });
            histList.querySelectorAll(".del").forEach(function(del){
                del.addEventListener("click", function(e){
                    e.stopPropagation(); playbackHistory.splice(parseInt(del.dataset.idx),1);
                    localStorage.setItem("vf_hist4", JSON.stringify(playbackHistory)); renderHist();
                });
            });
        }
        function esc(s){ var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

        // ====== Play ======
        function play(url) {
            url = url.trim(); if (!url) return;
            currentUrl = url;
            errMsg.classList.remove("show"); errMsg.textContent = "";
            
            // Cleanup previous HLS
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.pause(); video.removeAttribute("src"); video.load();
            
            emptyState.classList.add("hide"); video.classList.add("show");
            metaInfo.classList.add("show");
            metaInfo.innerHTML = "<b>加载中…</b><br>" + (url.length > 70 ? url.slice(0,70)+"…" : url);

            video.src = url; video.load();
            var pp = video.play();
            if (pp !== undefined) {
                pp.then(function(){ onPlayOK(url); }).catch(function(e){ onPlayErr(e, url); });
            }
        }

        function onPlayOK(url) {
            errMsg.classList.remove("show");
            metaInfo.innerHTML = "<b>正在播放</b><br>" + (url.length > 70 ? url.slice(0,70)+"…" : url);
            saveHist(url, url);
        }

        function onPlayErr(e, url) {
            var msg = e.message || "";
            if (msg.indexOf("NotSupported") !== -1 || (video.error && video.error.code === 4)) {
                if (url.indexOf(".m3u8") !== -1 || url.indexOf("m3u8") !== -1) {
                    errMsg.innerHTML = "检测到 m3u8 流，正在加载 HLS 解码器…";
                    errMsg.classList.add("show");
                    loadHls(url);
                } else {
                    errMsg.innerHTML = "❌ 无法播放：格式不支持或链接失效。<br>请确认是视频直链（以 .mp4 / .m3u8 / .webm 等结尾），而非网页地址。";
                    errMsg.classList.add("show");
                }
            } else if (msg.indexOf("NotAllowed") !== -1) {
                errMsg.innerHTML = "播放被阻止，请点击视频上的 ▶ 按钮手动开始。";
                errMsg.classList.add("show");
            } else {
                errMsg.innerHTML = "❌ 播放失败：" + (msg || "未知错误");
                errMsg.classList.add("show");
            }
            metaInfo.innerHTML = "<b>播放失败</b>";
        }

        video.addEventListener("loadeddata", function(){ onPlayOK(currentUrl); });
        video.addEventListener("error", function(){ onPlayErr(video.error||{}, currentUrl); });

        function loadHls(url) {
            if (window.Hls) { doHls(url); return; }
            var s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
            s.onload = function(){ doHls(url); };
            s.onerror = function(){ errMsg.innerHTML = "HLS 解码器加载失败，请检查网络。"; errMsg.classList.add("show"); };
            document.head.appendChild(s);
        }

        function doHls(url) {
            try {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url); hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(){
                        video.play().catch(function(){});
                        errMsg.classList.remove("show");
                        metaInfo.innerHTML = "<b>正在播放 (HLS)</b>";
                        saveHist(url, url);
                    });
                    hlsInstance.on(Hls.Events.ERROR, function(evt, data){
                        if (data.fatal) {
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    errMsg.innerHTML = "❌ 网络错误，HLS 流无法访问。"; break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    errMsg.innerHTML = "❌ 媒体错误，HLS 流已失效。"; break;
                                default:
                                    errMsg.innerHTML = "❌ HLS 解码失败。"; break;
                            }
                            errMsg.classList.add("show"); hlsInstance.destroy(); hlsInstance = null;
                        }
                    });
                } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                    video.src = url; video.play().catch(function(){});
                } else {
                    errMsg.innerHTML = "❌ 此浏览器不支持 HLS 流播放。";
                    errMsg.classList.add("show");
                }
            } catch(e) { errMsg.innerHTML = "❌ 解码失败：" + e.message; errMsg.classList.add("show"); }
        }

        document.getElementById("playBtn").addEventListener("click", function(){ play(urlInput.value); });
        urlInput.addEventListener("keydown", function(e){ if (e.key === "Enter") play(urlInput.value); });

        // Tags
        document.querySelector(".tags").addEventListener("click", function(e){
            if (e.target.tagName === "BUTTON" && e.target.dataset.url) {
                urlInput.value = e.target.dataset.url; play(e.target.dataset.url);
            }
        });

        // Controls
        document.getElementById("pipBtn").addEventListener("click", function(){
            try {
                if (document.pictureInPictureElement) document.exitPictureInPicture();
                else if (document.pictureInPictureEnabled) video.requestPictureInPicture();
            } catch(e) { toast("画中画不可用"); }
        });
        document.getElementById("fsBtn").addEventListener("click", function(){
            if (document.fullscreenElement) document.exitFullscreen();
            else video.requestFullscreen().catch(function(){ toast("全屏不可用"); });
        });
        var loopOn = false;
        document.getElementById("loopBtn").addEventListener("click", function(){
            loopOn = !loopOn; video.loop = loopOn; this.classList.toggle("on", loopOn);
        });
        var speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0], spIdx = 2;
        document.getElementById("spBtn").addEventListener("click", function(){
            spIdx = (spIdx + 1) % speeds.length; video.playbackRate = speeds[spIdx];
            this.textContent = "⚡ " + speeds[spIdx].toFixed(1) + "x";
        });

        // Paste
        document.addEventListener("paste", function(e){
            var t = e.clipboardData ? e.clipboardData.getData("text") : "";
            if (t && /^https?:\/\//.test(t) && document.activeElement !== urlInput) {
                urlInput.value = t; toast("链接已粘贴，点击播放");
            }
        });

        // Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/videofree/sw.js").catch(function(){});
        }

        // Init
        renderHist();
        urlInput.focus();
    </script>
</body>
</html>
